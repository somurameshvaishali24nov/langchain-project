services:
  langchain_ai_agent:
    build:
      context: .
      dockerfile: Dockerfile

    platform: linux/amd64

    # Auto-start Jupyter Lab as the container's main process (no login,
    # since the port below is bound to localhost only).
    # Ignored when opened via "Reopen in Container" (devcontainer.json's
    # overrideCommand takes over there); postStartCommand handles that path.
    command:
      - uv
      - run
      - jupyter
      - lab
      - --ip=0.0.0.0
      - --port=8888
      - --no-browser
      - --allow-root
      - --IdentityProvider.token=
      - --ServerApp.token=
      - --ServerApp.password=

    ports:
      - "127.0.0.1:8888:8888"

    volumes:
      - .:/app
      - /app/.venv
      - /app/venv

    env_file:
      - path: .env
        required: false

    depends_on:
      - qdrant

    stdin_open: true
    tty: true

  qdrant:
    image: qdrant/qdrant:latest

    ports:
      - "6333:6333"
      - "6334:6334"

    volumes:
      - qdrant_storage:/qdrant/storage

volumes:
  qdrant_storage: